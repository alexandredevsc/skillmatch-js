<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillMatch JS — Simulador de Vagas Front-End</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ✅ CSS externo -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Blobs decorativos -->
  <div class="blob blob-1" aria-hidden="true"></div>
  <div class="blob blob-2" aria-hidden="true"></div>

   <div class="wrapper">

    <!-- CABEÇALHO -->
    <header>
      <span class="badge">⚡ SkillMatch JS</span>
      <h1>Encontre sua<br /><span>vaga ideal</span>.</h1>
      <p class="subtitle">
        Simulador de compatibilidade entre seu perfil e vagas de
        Front-End Júnior. Insira suas habilidades e descubra onde você se encaixa.
      </p>
    </header>

    <!-- PREVIEW DO CANDIDATO -->
    <section class="candidate-section" aria-label="Perfil do candidato">
      <p class="section-label">// Candidato ativo</p>
      <div class="candidate-card">
        <div class="avatar" id="avatarEl" aria-hidden="true">AL</div>
        <div class="candidate-info">
          <div class="candidate-name" id="displayName">Ana Lima</div>
          <div class="candidate-meta" id="displayMeta">Front-End · 3 meses de experiência</div>
          <div class="skills-list" id="displaySkills"></div>
        </div>
      </div>
    </section>
